<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Pipeline</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Ensure port dots never clip */
    #graph * { overflow: visible; }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.75); }
    }
  </style>
</head>
<body class="h-screen flex bg-gray-50 font-sans overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-56 bg-white border-r border-gray-200 flex flex-col h-full flex-shrink-0">

    <!-- Brand -->
    <div class="px-4 py-4 border-b border-gray-200">
      <h1 class="text-sm font-bold text-gray-800 tracking-tight">✦ Image Pipeline</h1>
      <p class="text-xs text-gray-400 mt-0.5">Node graph editor</p>
    </div>

    <!-- Scrollable middle area -->
    <div class="flex-1 overflow-y-auto flex flex-col">

      <!-- Node palette -->
      <div class="px-3 py-3 border-b border-gray-100">
        <p class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-2">Add Node</p>
        <div id="node-palette" class="flex flex-col gap-1"></div>
      </div>

      <!-- Presets -->
      <div class="px-3 py-3">
        <p class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-2">Presets</p>
        <div id="presets-list" class="flex flex-col gap-1"></div>
      </div>

    </div>

    <!-- Actions (always visible at bottom) -->
    <div class="p-3 border-t border-gray-200 space-y-2">
      <button
        id="run-btn"
        class="w-full bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white text-sm font-medium py-2 px-4 rounded-lg transition-colors flex items-center justify-center gap-2"
      >
        <span>▶</span>
        <span>Run Pipeline</span>
      </button>

      <button
        id="export-btn"
        class="w-full bg-white hover:bg-gray-50 text-gray-500 hover:text-gray-700 text-xs font-medium py-1.5 px-3 rounded-lg border border-gray-200 transition-colors flex items-center justify-center gap-2"
      >
        <span>{ }</span>
        <span>Export to Console</span>
      </button>

      <!-- Auto-run toggle -->
      <label class="flex items-center gap-2 cursor-pointer select-none px-1 pt-1">
        <input id="auto-run-toggle" type="checkbox" checked class="w-3.5 h-3.5 accent-blue-500 cursor-pointer" />
        <span id="auto-run-label" class="text-xs text-gray-400">Auto-run on</span>
      </label>
    </div>
  </aside>

  <!-- Main graph area -->
  <div
    id="graph-container"
    class="flex-1 relative overflow-hidden bg-gray-50"
    style="background-image: radial-gradient(#d1d5db 1px, transparent 1px); background-size: 24px 24px;"
  >
    <!-- Edge canvas (behind nodes) -->
    <canvas id="edges" class="absolute inset-0 pointer-events-none"></canvas>

    <!-- Node cards -->
    <div id="graph" class="absolute inset-0" style="overflow:visible;"></div>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="fixed bottom-4 right-4 z-50 hidden">
    <div class="text-sm px-4 py-2 rounded-lg shadow-lg text-white bg-gray-700"></div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
